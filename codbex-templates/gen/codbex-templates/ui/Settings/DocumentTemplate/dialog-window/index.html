<!DOCTYPE HTML>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" ng-app="page" ng-controller="PageController">

    <head>
		<meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=">
        <title config-title></title>
        <script type="text/javascript" src="view.js"></script>
        <meta name="platform-links" category="ng-view">
		<script type="text/javascript" src="/services/web/dashboard/services/entity.js"></script>
        <script type="text/javascript" src="controller.js"></script>
    </head>

    <body class="bk-vbox">
        <bk-scrollbar class="bk-full-height">
            <bk-message-strip class="fd-margin--md" ng-show="errorMessage" glyph="sap-icon--message-error" state="error" on-dismiss="clearErrorMessage()">{{ errorMessage }}</bk-message-strip>

            <bk-fieldset class="fd-padding-begin-end--sm" ng-form="forms.details">
                <bk-form-group label="{{formHeaders[action]}}" name="entityForm" transclude-classes="fd-container fd-form-layout-grid-container">
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idType" ng-required="false" colon="true">{{ 'codbex-templates:codbex-templates-model.t.DOCUMENTTEMPLATE_TYPE' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col  fd-col-md--8 ">
	                        <bk-combobox-input input-id="idType"
	                            name="Type"
	                            state="{{ forms.details['Type'].$valid ? '' : 'error' }}"
	                            ng-required="false"
	                            ng-model="entity.Type"
	                            is-readonly="action === 'select'"
	                            dropdown-items="optionsType"
	                            placeholder="{{ 'codbex-templates:codbex-templates-model.messages.inputSearch' | t:{'name':'$t(codbex-templates:codbex-templates-model.t.DOCUMENTTEMPLATE_TYPE)'} }}"
								btn-aria-label="{{ 'codbex-templates:codbex-templates-model.aria.showHide' | t:{'name':'Type'} }}" list-aria-label="{{ 'codbex-templates:codbex-templates-model.aria.options' | t:{'name':'Type'} }}">
	                        </bk-combobox-input>
	                    </div>
                    </bk-form-item>
					<bk-form-item class="fd-row">
						<div class="fd-col fd-col-md--2">
							<bk-form-label for="idContent" ng-required="true" colon="true">{{ 'codbex-templates:codbex-templates-model.t.DOCUMENTTEMPLATE_CONTENT' | t }}</bk-form-label>
						</div>
						<div class="fd-col  fd-col-md--8 ">
							<bk-form-input-message state="{{ forms.details['Content'].$valid ? '' : 'error' }}" text="{{ 'codbex-templates:codbex-templates-model.messages.error.pattern' | t:{'rule':''} }}">
								<bk-textarea id="idContent"
									name="Content"
									state="{{ forms.details['Content'].$valid ? '' : 'error' }}"
									ng-required="true"
									ng-model="entity.Content"
	                            	ng-readonly="action === 'select'"
									input-rules="{ patterns: [''] }"
									placeholder="{{ 'codbex-templates:codbex-templates-model.messages.inputEnter' | t:{'name':'$t(codbex-templates:codbex-templates-model.t.DOCUMENTTEMPLATE_CONTENT)'} }}">
								</bk-textarea>
							</bk-form-input-message>
						</div>
					</bk-form-item>
                </bk-form-group>
            </bk-fieldset>
        </bk-scrollbar>

		<bk-bar bar-design="footer" compact="true" ng-show="action !== 'select'">
			<bk-bar-right>
				<bk-bar-element>
					<bk-button ng-if="action === 'create'" label="{{'codbex-templates:codbex-templates-model.defaults.create' | t}}" state="emphasized" ng-click="create()" ng-disabled="!forms.details.$valid"></bk-button>
					<bk-button ng-if="action !== 'create'" label="{{'codbex-templates:codbex-templates-model.defaults.update' | t}}" state="emphasized" ng-click="update()" ng-disabled="!forms.details.$valid"></bk-button>
				</bk-bar-element>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-templates:codbex-templates-model.defaults.cancel' | t }}" ng-click="cancel()"></bk-button>
				</bk-bar-element>
			</bk-bar-right>
		</bk-bar>
		<theme></theme>
    </body>

</html>
